- type: constructionGraph
  id: SmallNuclearReactor
  start: start
  graph:
  - node: start

  - node: reactor
    entity: NuclearReactorUnaffiliatedSmall
    edges:
    - to: start
      completed:
      - !type:AdminLog
        message: "A nuclear reactor was deconstructed"
      - !type:SpawnPrototype
        prototype: SmallNuclearReactorFlatpack
        amount: 1
      - !type:DeleteEntity
      steps:
      - tool: Welding
        doAfter: 3
